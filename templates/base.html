<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IntelliCore{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">IntelliCore</a>
            <span class="tagline">BAS Discovery</span>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>IntelliCore v0.1.0 &mdash; Lightweight BACnet/IP Discovery</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
